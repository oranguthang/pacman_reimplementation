on: 
  push:
  # Run once a week to make sure nothing randomly breaks without us knowing
  schedule:
    - cron: '23 23 * * 0'

jobs:
  build_rom:
    runs-on: ubuntu-latest
    container: igwgames/create-nes-game:v1.0.13
    name: Compile rom
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Move things into the spots github CI expects them in
        run: "cp -a /root/. /github/home"
      - name: Install dependencies
        run: create-nes-game download-dependencies --assume-yes
      # The real graphics/tiles.chr and graphics/sprites.chr contain artwork from
      # the original Pac-Man ROM (Namco copyright) and are intentionally git-ignored,
      # so they are absent in CI. Substitute the non-copyrighted ascii.chr (same 4KB
      # segment size) as a placeholder so the build and tests can validate the code.
      # This never runs locally where the real files are present.
      - name: Provide placeholder CHR graphics for CI
        run: |
          [ -f graphics/tiles.chr ] || cp graphics/ascii.chr graphics/tiles.chr
          [ -f graphics/sprites.chr ] || cp graphics/ascii.chr graphics/sprites.chr
      - name: Build the game
        run: create-nes-game build
      - name: Start xvfb 
        run: sudo Xvfb :99 -screen 0 1280x1024x24 &
      - name: Run unit tests
        run: DISPLAY=:99 create-nes-game test --debug
      - name: Clean up xvfb
        uses: bcomnes/cleanup-xvfb@v1
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Game Download
          path: rom
